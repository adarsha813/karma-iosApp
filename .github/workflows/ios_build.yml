name: Build iOS Simulator App

# Trigger on push or manual workflow run
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-simulator:
    runs-on: macos-latest

    steps:
      # 1. Checkout your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.6' # replace with your Flutter version

      # 3. Get Flutter dependencies
      - name: Install dependencies
        run: flutter pub get

      # 4. Build for iOS Simulator
      - name: Build iOS Simulator
        run: flutter build ios --simulator --no-codesign

      # 5. Archive the simulator build
      - name: Archive Simulator Build
        run: |
          mkdir -p build-artifact
          cp -r build/ios/iphonesimulator/Runner.app build-artifact/
          cd build-artifact
          zip -r Runner-simulator.zip Runner.app

      # 6. Upload as artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-simulator-build
          path: build-artifact/Runner-simulator.zip
