scripts:
  - name: Clean old Pods
    script: |
      cd ios
      rm -rf Pods Podfile.lock
      cd ..

  - name: Flutter clean
    script: flutter clean

  - name: Flutter pub get
    script: flutter pub get

  - name: Install Pods
    script: |
      cd ios
      pod repo update
      pod install
      cd ..

  - name: Build iOS Release
    script: flutter build ios --release --no-codesign
