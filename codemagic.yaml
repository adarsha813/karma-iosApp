scripts:
  - name: Flutter clean
    script: flutter clean

  - name: Get Flutter dependencies
    script: flutter pub get

  - name: Generate iOS plugin files
    script: flutter pub get
    # Or flutter build ios --no-codesign, but do NOT do pod install before this

  - name: Build iOS (Codemagic-friendly)
    script: |
      cd ios
      pod install --repo-update
      cd ..
      flutter build ios --release --no-codesign
