workflows:
  ios-stellar-preview:
    name: iOS Stellar Preview Build
    max_build_duration: 60

    environment:
      groups:
        - app_store_credentials  # Your API keys are stored here
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.karmaverse.kundali

    scripts:
      - name: Clean and install dependencies
        script: |
          flutter clean
          flutter pub get
          
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..
          
      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            -t lib/main_prod.dart \
            --flavor ios-production

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      stellar_preview:
        enable: true