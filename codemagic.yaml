workflows:
  ios-workflow:
    name: iOS Build Workflow
    environment:
      groups:
        - app_credentials
      flutter: stable
      cocoapods: default
      xcode: latest
    scripts:
      - name: Clean workspace
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ios/Runner.xcworkspace
      
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      
      - name: Generate iOS files
        script: |
          # This generates the Flutter/Generated.xcconfig file
          flutter build ios --no-codesign --verbose
      
      - name: Install CocoaPods
        script: |
          cd ios
          
          # Check if Generated.xcconfig exists
          if [ ! -f "../Flutter/Generated.xcconfig" ]; then
            echo "Error: Generated.xcconfig not found. Running flutter build ios again..."
            cd ..
            flutter build ios --no-codesign
            cd ios
          fi
          
          # Install pods with specific flags
          pod install --repo-update --verbose
          cd ..
      
      - name: Build iOS app
        script: |
          cd ios
          xcodebuild clean \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          cd ..
    artifacts:
      - build/ios/Release-iphoneos/Runner.app
    publishing:
      email:
        recipients:
          - projectm2025.20.02@gmail.com