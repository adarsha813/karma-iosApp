workflows:
  ios_build:
    name: Build iOS
    max_build_duration: 60
    environment:
      vars:
        FLUTTER_CHANNEL: stable
        FLUTTER_VERSION: latest
      cocoapods_cache: true

    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios   # Ensures iOS tools exist

      - name: Ensure Flutter iOS plugins
        script: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs || true

      - name: Install iOS Pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS IPA
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa
