workflows:
  ios-simulator:
    name: iOS Simulator Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Clean Flutter & iOS
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks

      - name: Get Flutter packages
        script: flutter pub get

      # Force iOS project with iOS 15
      - name: Regenerate iOS files
        script: |
          rm -rf ios
          flutter create --platforms=ios .

      # Force deployment target in Xcode project
      - name: Force iOS 15 deployment target
        script: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' ios/Runner.xcodeproj/project.pbxproj

      # Create clean Podfile
      - name: Create fixed Podfile
        script: |
          cat > ios/Podfile <<'EOF'
          platform :ios, '15.0'
          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          use_frameworks! :linkage => :static

          target 'Runner' do
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
              end
            end
          end
          EOF

      # Install pods fresh
      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      # Build iOS Simulator app
      - name: Build iOS Simulator App
        script: flutter build ios --simulator

      # Skip flutter analyze issues (warnings won't fail the build)
      - name: Flutter Analyze (non-fatal)
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      # Skip flutter test if test folder is missing
      - name: Flutter Test (optional)
        script: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test folder found, skipping tests"
          fi

    artifacts:
      - /Users/builder/Library/Developer/Xcode/DerivedData/**/*.app

    publishing:
      stellar_preview:
        enable: true   # <-- Enables Stellar App Preview
