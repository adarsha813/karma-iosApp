workflows:
  ios-workflow:
    name: iOS Build Workflow
    environment:
      groups:
        - app_credentials
      flutter: stable
      cocoapods: default
      xcode: latest

    scripts:
      - name: Set up Flutter
        script: |
          flutter channel stable
          flutter upgrade --force
          flutter config --no-analytics
          flutter doctor -v
      
      - name: Clean workspace
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ~/Library/Caches/CocoaPods
          pod cache clean --all
      
      - name: Get dependencies
        script: |
          flutter pub get

      # ✅ ALWAYS overwrite Podfile (required!)
      - name: Create Podfile
        script: |
          cd ios
          echo "Overwriting Podfile..."

          cat > Podfile << 'EOF'
platform :ios, '13.0'

# IMPORTANT: Flutter + Firebase require static linking


target 'Runner' do
  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
end

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
      config.build_settings['CLANG_ALLOW_NON_MODULAR_INCLUDES_IN_FRAMEWORK_MODULES'] = 'YES'
    end
  end
end
EOF

          cd ..

      - name: Generate iOS build files
        script: |
          flutter build ios --no-codesign --verbose

      - name: Install CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          pod repo update
          pod install --repo-update --verbose
          cd ..

      - name: Build iOS app (no code signing)
        script: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

    artifacts:
      - build/ios/Release-iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - projectm2025.20.02@gmail.com
