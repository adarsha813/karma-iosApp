workflows:
  ios-workflow:
    name: iOS Build Workflow
    environment:
      groups:
        - app_credentials
      flutter: stable
      cocoapods: default
      xcode: latest
      vars:
        FLUTTER_FIREBASE_SDK_VERSION: "10.23.0"
    scripts:
      - name: Set up Flutter
        script: |
          flutter channel stable
          flutter upgrade --force
          flutter config --no-analytics
          flutter doctor -v
      
      - name: Clean workspace
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ~/Library/Caches/CocoaPods
          pod cache clean --all
      
      - name: Get dependencies
        script: |
          flutter pub get
      
      - name: Generate iOS files
        script: |
          flutter build ios --no-codesign --verbose
      
      - name: Install CocoaPods with Firebase fixes
        script: |
          cd ios
          pod deintegrate || true
          pod repo update
          
          # Set environment variables for Firebase
          export FIREBASE_SDK_VERSION=10.23.0
          
          pod install --repo-update --verbose
          
          # Fix Firebase header paths
          find Pods -name "*.h" -type f -exec grep -l "Firebase.h" {} \; | while read file; do
            echo "Checking $file for Firebase.h includes"
          done
          cd ..
      
      - name: Build iOS app
        script: |
          cd ios
          xcodebuild clean \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_CFLAGS="-DFIREBASE_USE_MODULAR_FRAMEWORK=1" \
            | xcpretty
    artifacts:
      - build/ios/Release-iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - projectm2025.20.02@gmail.com